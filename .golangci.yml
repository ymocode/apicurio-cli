version: "2"

linters:
  default: standard
  settings:
    govet:
      enable-all: true
    staticcheck:
      checks:
        - all
        - -QF1003  # Switch vs if-else - style preference
    gosec:
      excludes:
        - G402  # TLS InsecureSkipVerify - intentional, controlled by --insecure flag
        - G306  # WriteFile 0644 - output files are not sensitive, need to be readable
  exclusions:
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - dupl

formatters:
  enable:
    - gofmt
    - goimports

run:
  timeout: 5m
  go: "1.24.x"
