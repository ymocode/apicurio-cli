version: "2"

linters:
  default: standard
  settings:
    govet:
      enable-all: true
    staticcheck:
      checks:
        - all
        - -QF1003  # Switch vs if-else - style preference, not a bug
  exclusions:
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - dupl

formatters:
  enable:
    - gofmt
    - goimports

run:
  timeout: 5m
  go: "1.24"
